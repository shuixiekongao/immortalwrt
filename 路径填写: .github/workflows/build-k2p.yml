name: Build K2P Firmware

on:
  push:
    branches:
      - k2p-32m-512m-usb
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    timeout-minutes: 360

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libncurses-dev zlib1g-dev gawk flex quilt libssl-dev xsltproc rsync wget unzip python3 device-tree-compiler mkisofs ccache

      - name: Update Feeds
        run: |
          cp feeds.conf.default feeds.conf
          cat feeds.conf.k2p >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Download Sources
        run: make -j$(nproc) download V=s

      - name: Build Firmware
        run: make -j$(nproc) V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: k2p-firmware-${{ github.run_number }}
          path: bin/targets/ramips/mt7620/
          retention-days: 30
